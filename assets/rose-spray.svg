<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <radialGradient id="petal" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#c0303c"/>
      <stop offset="55%" stop-color="#9c1422"/>
      <stop offset="100%" stop-color="#5e0d16"/>
    </radialGradient>
    <radialGradient id="petal2" cx="40%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#b0202e"/>
      <stop offset="100%" stop-color="#6e0f18"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f7d44"/>
      <stop offset="100%" stop-color="#46562c"/>
    </linearGradient>
  </defs>

  <!-- stems -->
  <g stroke="#4d5a2e" stroke-width="3" fill="none" stroke-linecap="round" opacity=".9">
    <path d="M70 60 C90 110 120 150 150 210"/>
    <path d="M150 70 C160 120 170 170 175 230"/>
    <path d="M40 120 C90 140 130 170 200 200"/>
  </g>

  <!-- leaves -->
  <g fill="url(#leaf)" opacity=".95">
    <path d="M110 150 C90 140 70 150 66 172 C92 176 110 168 110 150Z"/>
    <path d="M150 170 C168 156 192 160 200 180 C176 192 156 188 150 170Z"/>
    <path d="M120 195 C100 192 84 206 86 226 C112 224 124 212 120 195Z"/>
    <path d="M175 130 C190 116 214 118 222 136 C200 150 180 148 175 130Z"/>
  </g>

  <!-- rose 1 (large) -->
  <g transform="translate(78,64)">
    <circle r="34" fill="url(#petal)"/>
    <g fill="url(#petal2)" opacity=".9">
      <path d="M0 -30 C16 -28 26 -16 24 0 C8 -6 -8 -6 -24 0 C-26 -16 -16 -28 0 -30Z"/>
      <path d="M30 0 C28 16 16 26 0 24 C6 8 6 -8 0 -24 C16 -26 28 -16 30 0Z"/>
      <path d="M0 30 C-16 28 -26 16 -24 0 C-8 6 8 6 24 0 C26 16 16 28 0 30Z"/>
      <path d="M-30 0 C-28 -16 -16 -26 0 -24 C-6 -8 -6 8 0 24 C-16 26 -28 16 -30 0Z"/>
    </g>
    <circle r="13" fill="#5e0d16"/>
    <circle r="5" fill="#3f0a11"/>
  </g>

  <!-- rose 2 -->
  <g transform="translate(158,72)">
    <circle r="26" fill="url(#petal)"/>
    <g fill="url(#petal2)" opacity=".9">
      <path d="M0 -23 C12 -21 20 -12 18 0 C6 -4 -6 -4 -18 0 C-20 -12 -12 -21 0 -23Z"/>
      <path d="M23 0 C21 12 12 20 0 18 C4 6 4 -6 0 -18 C12 -20 21 -12 23 0Z"/>
      <path d="M0 23 C-12 21 -20 12 -18 0 C-6 4 6 4 18 0 C20 12 12 21 0 23Z"/>
    </g>
    <circle r="9" fill="#5e0d16"/>
  </g>

  <!-- bud -->
  <g transform="translate(46,118)">
    <path d="M0 -16 C9 -14 12 -4 9 6 C2 4 -2 4 -9 6 C-12 -4 -9 -14 0 -16Z" fill="url(#petal)"/>
    <path d="M-9 6 C-6 14 6 14 9 6 C4 12 -4 12 -9 6Z" fill="url(#leaf)"/>
  </g>
</svg>
